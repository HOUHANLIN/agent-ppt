<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--ink);overflow:hidden;
  font-family:"Source Han Serif SC","Noto Serif CJK SC","Songti SC","Noto Sans SC","Microsoft YaHei",serif;
  display:flex;height:100vh;
}

/* Thumbnail sidebar */
.thumb-panel{
  width:170px;min-width:170px;height:100vh;
  background:rgba(32,41,64,.95);
  overflow-y:auto;overflow-x:hidden;
  padding:8px 7px;flex-shrink:0;
  scrollbar-width:thin;
  scrollbar-color:rgba(202,170,152,.35) transparent;
}
.thumb-panel::-webkit-scrollbar{width:4px}
.thumb-panel::-webkit-scrollbar-thumb{background:rgba(202,170,152,.35);border-radius:2px}
.thumb-item{
  width:100%;padding:8px 6px;
  border:1.5px solid rgba(202,170,152,.15);
  border-radius:3px;margin-bottom:5px;cursor:pointer;
  background:rgba(255,253,249,.06);
  transition:border-color .2s,background .2s;
}
.thumb-item:hover{border-color:rgba(202,170,152,.5);background:rgba(255,253,249,.1)}
.thumb-item.active{border-color:var(--sand);background:rgba(202,170,152,.15)}
.thumb-num{
  font-size:10px;color:var(--sand);font-weight:700;
  margin-bottom:2px;display:block;
}
.thumb-title{
  font-size:11px;color:rgba(255,250,246,.75);line-height:1.35;
  display:block;word-break:break-all;
}
.thumb-section{
  font-size:9px;color:rgba(255,250,246,.4);margin-top:2px;display:block;
}

/* Main area */
.slide-area{
  flex:1;display:flex;align-items:center;justify-content:center;
  height:100vh;overflow:hidden;position:relative;
}
.slide{
  display:none;
  width:calc(100vh * 16 / 9);height:100vh;
  max-width:calc(100vw - 170px);
  max-height:calc((100vw - 170px) * 9 / 16);
  background:linear-gradient(180deg,var(--paper),#fffdf9);
  border:1.5px solid rgba(202,170,152,.95);
  overflow:hidden;aspect-ratio:16/9;position:relative;
}
.slide.active{display:block}

/* Fullscreen */
body:fullscreen .thumb-panel,body:-webkit-full-screen .thumb-panel{display:none}
body:fullscreen,body:-webkit-full-screen{justify-content:center}
body:fullscreen .slide,body:-webkit-full-screen .slide{
  max-width:100vw;max-height:calc(100vw * 9 / 16);
}

/* Controls */
.nav-controls{
  position:fixed;bottom:8px;right:8px;
  display:flex;align-items:center;gap:var(--gap-xxs);
  z-index:9999;opacity:0.4;transition:opacity .3s;
}
.nav-controls:hover{opacity:1}
.nav-btn{
  background:rgba(32,41,64,.8);color:#fffaf6;
  border:1px solid rgba(202,170,152,.3);border-radius:3px;
  padding:4px 9px;font-size:12px;cursor:pointer;font-family:inherit;
}
.nav-btn:hover{background:rgba(32,41,64,.95)}
#slide-counter{color:rgba(255,250,246,.55);font-size:11px;min-width:36px;text-align:center}
#progress-bar{position:fixed;top:0;left:0;height:2px;background:var(--sand);transition:width .3s;z-index:9999}
/* PPTX export button/status */
.export-btn{min-width:76px;font-weight:700}
#export-status{color:rgba(255,250,246,.75);font-size:11px;min-width:80px;text-align:left}
.export-hidden-stage{position:fixed;left:-99999px;top:0;width:1280px;height:720px;overflow:hidden;background:transparent;z-index:-1;pointer-events:none}
.export-hidden-stage .slide{display:block!important;position:relative!important;left:auto!important;top:auto!important;transform:none!important;width:1280px!important;height:720px!important;min-width:1280px!important;min-height:720px!important;max-width:none!important;max-height:none!important;margin:0!important;box-shadow:none!important}
@media print{.export-btn,#export-status{display:none!important}}

@media print{
  .slide{display:block!important;position:static;transform:none;width:16in;height:9in;max-width:none;max-height:none;page-break-after:always}
  .nav-controls,#progress-bar,.thumb-panel{display:none!important}
  body{display:block}
}

<section class="slide slide--cover" data-title="封面页" data-section="首页 / 标题 / 汇报信息"><div class="cover"><div class="cover-text"><div class="eyebrow">课程 / 汇报 / 项目</div><h1>在这里输入主标题</h1><p class="subtitle">在这里输入副标题或英文标题</p><div class="team-info">汇报人：姓名<br/>单位：学院 / 班级 / 小组<br/>日期：YYYY.MM.DD</div></div><div class="cover-img"><div class="fig" style="height:360px;display:flex;align-items:center;justify-content:center;">封面图片 / Logo 占位</div></div></div></section><section class="slide slide--toc" data-title="目录页" data-section="目录 / 汇报结构"><div class="toc"><h1>目 录</h1><ol><li>章节标题占位</li><li>章节标题占位</li><li>章节标题占位</li><li>章节标题占位</li><li>章节标题占位</li></ol></div></section><section class="slide task-divider slide--divider" data-title="主题页" data-section="章节分隔 / PART 标题"><div class="task-cover"><div class="task-num">01</div><div class="eyebrow">PART 01</div><h1>章节标题</h1><p>用一句话说明本章节要解决的问题。</p></div></section>

<div class="nav-controls">
<button class="nav-btn" id="btn-prev">‹</button>
<span id="slide-counter">1/3</span>
<button class="nav-btn" id="btn-next">›</button>
<button class="nav-btn" id="btn-fs">⛶</button>
<button class="nav-btn export-btn" id="btn-export-pptx" title="将每页以高清截图写入 PPTX，保持 16:9 比例">导出PPTX</button>
<span aria-live="polite" id="export-status"></span>
</div>
<div id="progress-bar" style="width:2.2222%"></div>
<script>
(function(){
  var slides=document.querySelectorAll('.slide');
  var total=slides.length;
  var current=0;
  var counter=document.getElementById('slide-counter');
  var bar=document.getElementById('progress-bar');
  var thumbPanel=document.getElementById('thumb-panel');

  // --- Dynamic thumbnail generation ---
  // Each slide can declare metadata via data-title and data-section attributes.
  // Fallback: derive title from h1 / .eyebrow / "Slide N".
  function buildThumbs(){
    thumbPanel.innerHTML='';
    var sectionLabels=[
      {cls:'slide--cover',title:'封面页',section:'首页 / 标题 / 汇报信息'},
      {cls:'slide--toc',title:'目录页',section:'目录 / 汇报结构'},
      {cls:'slide--divider',title:'主题页',section:'章节分隔 / PART 标题'}
    ];
    for(var i=0;i<total;i++){
      var s=slides[i];
      var label={title:'Slide '+(i+1),section:''};
      // Check data-attributes first
      if(s.dataset.title) label.title=s.dataset.title;
      if(s.dataset.section) label.section=s.dataset.section;
      // Then check known classes
      if(!s.dataset.title){
        for(var k=0;k<sectionLabels.length;k++){
          if(s.classList.contains(sectionLabels[k].cls)){
            label.title=sectionLabels[k].title;
            label.section=sectionLabels[k].section;
            break;
          }
        }
        // Fallback: use h1 text
        if(!s.classList.contains('slide--cover')&&!s.classList.contains('slide--toc')&&!s.classList.contains('slide--divider')){
          var h1=s.querySelector('h1');
          if(h1) label.title=h1.textContent.trim().slice(0,20);
        }
      }
      var item=document.createElement('div');
      item.className='thumb-item'+(i===current?' active':'');
      item.innerHTML='<span class="thumb-num">'+(i+1)+'</span><span class="thumb-title">'+label.title+'</span>'+(label.section?'<span class="thumb-section">'+label.section+'</span>':'');
      (function(idx){item.addEventListener('click',function(){show(idx)})})(i);
      thumbPanel.appendChild(item);
    }
  }
  buildThumbs();

  function show(n){
    if(n<0||n>=total)return;
    current=n;
    for(var i=0;i<total;i++){
      slides[i].classList.toggle('active',i===n);
    }
    var thumbs=thumbPanel.querySelectorAll('.thumb-item');
    for(var i=0;i<thumbs.length;i++){
      thumbs[i].classList.toggle('active',i===n);
    }
    counter.textContent=(current+1)+'/'+total;
    bar.style.width=((current+1)/total*100)+'%';
    if(thumbs[n])thumbs[n].scrollIntoView({behavior:'smooth',block:'nearest'});
  }
  function next(){show(current+1)}
  function prev(){show(current-1)}
  function goFS(){
    var el=document.documentElement;
    if(!document.fullscreenElement)(el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen).call(el);
    else(document.exitFullscreen||document.webkitExitFullscreen||document.msExitFullscreen).call(document);
  }

  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(k==='ArrowRight'||k===' '||k==='ArrowDown'||k==='PageDown'){e.preventDefault();next()}
    else if(k==='ArrowLeft'||k==='ArrowUp'||k==='PageUp'){e.preventDefault();prev()}
    else if(k==='f'||k==='F'){e.preventDefault();goFS()}
    else if(k==='Home'){e.preventDefault();show(0)}
    else if(k==='End'){e.preventDefault();show(total-1)}
    else if(k==='Escape'&&document.fullscreenElement)(document.exitFullscreen||document.webkitExitFullscreen).call(document);
  });

  document.getElementById('btn-prev').onclick=function(e){e.stopPropagation();prev()};
  document.getElementById('btn-next').onclick=function(e){e.stopPropagation();next()};
  document.getElementById('btn-fs').onclick=function(e){e.stopPropagation();goFS()};

  show(0);
})();
</script>
<script id="pptx-exporter">
(function(){
  var EXPORT_W = 1280;
  var EXPORT_H = 720;
  var PPT_W = 13.333333;
  var PPT_H = 7.5;
  var EXPORT_SCALE = 2.5; // 3200×1800 screenshots: clear text/figures without huge files.
  var btn = document.getElementById('btn-export-pptx');
  var status = document.getElementById('export-status');

  function setStatus(text){ if(status) status.textContent = text || ''; }

  function loadScript(src){
    return new Promise(function(resolve,reject){
      var found = Array.prototype.slice.call(document.scripts).find(function(s){ return s.src === src; });
      if(found){ resolve(); return; }
      var script=document.createElement('script');
      script.src=src;
      script.async=true;
      script.onload=function(){ resolve(); };
      script.onerror=function(){ reject(new Error('无法加载导出依赖：'+src)); };
      document.head.appendChild(script);
    });
  }

  async function ensureExportLibraries(){
    if(!window.html2canvas){
      await loadScript('lib/html2canvas.min.js');
    }
    if(!(window.pptxgen || window.PptxGenJS)){
      await loadScript('lib/pptxgen.bundle.js');
    }
    if(!window.html2canvas) throw new Error('html2canvas 未成功加载');
    if(!(window.pptxgen || window.PptxGenJS)) throw new Error('pptxgenjs 未成功加载');
  }

  function waitForImages(root){
    var imgs=Array.prototype.slice.call(root.querySelectorAll('img'));
    return Promise.all(imgs.map(function(img){
      if(img.complete && img.naturalWidth>0) return Promise.resolve();
      return new Promise(function(resolve){
        img.onload=resolve;
        img.onerror=resolve;
        setTimeout(resolve,3000);
      });
    }));
  }

  async function renderSlideToImage(slideEl){
    var stage=document.createElement('div');
    stage.className='export-hidden-stage';
    var clone=slideEl.cloneNode(true);
    clone.classList.add('active');
    clone.style.display='block';
    stage.appendChild(clone);
    document.body.appendChild(stage);
    await waitForImages(stage);
    await document.fonts.ready.catch(function(){});
    var canvas = await window.html2canvas(clone, {
      scale: EXPORT_SCALE,
      backgroundColor: null,
      useCORS: true,
      allowTaint: true,
      logging: false,
      width: EXPORT_W,
      height: EXPORT_H,
      windowWidth: EXPORT_W,
      windowHeight: EXPORT_H,
      scrollX: 0,
      scrollY: 0
    });
    document.body.removeChild(stage);
    return canvas.toDataURL('image/png');
  }

  async function exportToPPTX(){
    await ensureExportLibraries();
    var PptxCtor = window.pptxgen || window.PptxGenJS;
    var pptx = new PptxCtor();
    if(pptx.defineLayout){
      pptx.defineLayout({ name:'HTML_16_9', width:PPT_W, height:PPT_H });
      pptx.layout = 'HTML_16_9';
    }else{
      pptx.layout = 'LAYOUT_WIDE';
    }
    pptx.author = 'ChatGPT HTML PPT exporter';
    pptx.subject = 'Slides rendered from fixed 1280×720 HTML canvas';
    pptx.title = document.title || 'presentation';
    pptx.company = '';
    pptx.lang = 'zh-CN';

    var slides = Array.prototype.slice.call(document.querySelectorAll('.slide'));
    for(var i=0;i<slides.length;i++){
      setStatus('导出 '+(i+1)+'/'+slides.length);
      var img = await renderSlideToImage(slides[i]);
      var p = pptx.addSlide();
      p.background = { color: 'FFFFFF' };
      p.addImage({ data: img, x: 0, y: 0, w: PPT_W, h: PPT_H });
    }
    setStatus('正在保存…');
    await pptx.writeFile({ fileName: 'presentation_exported_16x9.pptx' });
    setStatus('完成');
    setTimeout(function(){ setStatus(''); }, 3000);
  }

  window.exportToPPTX = exportToPPTX;
  if(btn){
    btn.addEventListener('click', async function(e){
      e.stopPropagation();
      if(btn.disabled) return;
      btn.disabled = true;
      var oldText = btn.textContent;
      btn.textContent = '导出中';
      try{
        await exportToPPTX();
      }catch(err){
        console.error(err);
        setStatus('导出失败');
        alert('导出 PPTX 失败：' + (err && err.message ? err.message : err));
      }finally{
        btn.disabled = false;
        btn.textContent = oldText;
      }
    });
  }
})();
</script>
<script id="fixed-canvas-scaler">
(function(){
  var area=document.querySelector('.slide-area');
  if(!area || document.querySelector('.deck')) return;
  var slides=Array.prototype.slice.call(area.querySelectorAll('.slide'));
  var stage=document.createElement('div');
  stage.className='stage';
  var deck=document.createElement('div');
  deck.className='deck';
  area.insertBefore(stage, slides[0] || null);
  stage.appendChild(deck);
  slides.forEach(function(slide){deck.appendChild(slide);});

  function fitDeck(){
    var w=area.clientWidth || window.innerWidth;
    var h=area.clientHeight || window.innerHeight;
    var scale=Math.min(w/1280, h/720);
    if(!isFinite(scale) || scale<=0) scale=0.1;
    scale=Math.max(0.10, scale);
    stage.style.width=(1280*scale)+'px';
    stage.style.height=(720*scale)+'px';
    deck.style.transform='scale('+scale+')';
  }
  window.addEventListener('resize', fitDeck);
  document.addEventListener('fullscreenchange', fitDeck);
  document.addEventListener('webkitfullscreenchange', fitDeck);
  fitDeck();
})();
</script>
